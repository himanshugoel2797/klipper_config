[include mmu/base/*.cfg]
[include mmu/optional/client_macros.cfg]
[include fluidd.cfg]
[include timelapse.cfg]


[mcu]
canbus_uuid: 2e1a0a42ef75


[mcu toolhead]
canbus_uuid: 6054a5d90ab3

[board_pins toolhead]
mcu: toolhead
aliases:
  ENTRY_SENSOR=PB9,

[mcu mmb]
canbus_uuid: d6c0aea18851

[board_pins mmb]
mcu: mmb
aliases:
  MMU_GEAR_UART=PA10,
  MMU_GEAR_STEP=PB15,
  MMU_GEAR_DIR=PB14,
  MMU_GEAR_ENABLE=PB8,
  MMU_GEAR_DIAG=PA3,
  MMU_SEL_UART=PC7,
  MMU_SEL_STEP=PD2,
  MMU_SEL_DIR=PB13,
  MMU_SEL_ENABLE=PD1,
  MMU_SEL_DIAG=PA4,
  MMU_SEL_ENDSTOP=PC15,
  BELAY_SENSOR=PC3,
  MMU_SERVO=PA0,
  MMU_ENCODER=PA1,
  PREGATE2=PB12,
  PREGATE3=PB11,
  PREGATE4=PB10,
  TENSION_SENSOR=PC13,
  COMPRESSION_SENSOR=PC14,



[stepper_x]
step_pin: PB10
dir_pin: PB11
enable_pin: !PG0
microsteps: 64
rotation_distance: 40
endstop_pin: tmc5160_stepper_x:virtual_endstop 
position_endstop: 260
position_max: 260
position_min: -12
homing_speed: 100
homing_retract_dist: 132.5
min_home_dist: 20

[tmc5160 stepper_x]
cs_pin: PE15
diag0_pin: ^!PG1
spi_bus: spi4
sense_resistor: 0.075
interpolate: false
run_current: 1.2
home_current: 0.5
driver_SGT: 2

[stepper_y]
step_pin: PF15
dir_pin: PF14
enable_pin: !PE9
microsteps: 64
rotation_distance: 40
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_min: -1
position_endstop: 0
position_max: 261
homing_speed: 50
homing_retract_dist: 127.5
min_home_dist: 20

[tmc5160 stepper_y]
cs_pin: PE11
diag0_pin: ^!PE10
spi_bus: spi4
sense_resistor: 0.075
interpolate: false
run_current: 1.2
home_current: 0.5
driver_SGT: 2

[stepper_z]
step_pin: PC9
dir_pin: PC8
enable_pin: !PC10
microsteps: 64
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_max: 300
position_min: -10
homing_speed: 8
homing_retract_dist: 0

[tmc2209 stepper_z]
interpolate: false
uart_pin: PA8
run_current: 1.0
sense_resistor: 0.110

[stepper_z1]
step_pin: PG7
dir_pin: PG6
enable_pin: !PC7
microsteps: 64
rotation_distance: 4

[tmc2209 stepper_z1]
interpolate: false
uart_pin: PG8
run_current: 1.0
sense_resistor: 0.110

[stepper_z2]
step_pin: PD10
dir_pin: PD9
enable_pin: !PD13
microsteps: 64
rotation_distance: 4

[tmc2209 stepper_z2]
interpolate: false
uart_pin: PD11
run_current: 1.0
sense_resistor: 0.110

[extruder]
max_extrude_only_distance: 500.0
step_pin: toolhead:PD0
dir_pin: !toolhead:PD1
enable_pin: !toolhead:PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 22.67895
gear_ratio:50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: toolhead:PB13
sensor_type: PT1000
pullup_resistor: 4583
sensor_pin: toolhead:PA3
pressure_advance: 0.03
pressure_advance_smooth_time: 0.04
min_temp: 0
max_temp: 300
min_extrude_temp: 170
max_extrude_cross_section: 100.0

[tmc2209 extruder]
interpolate: true
uart_pin:toolhead:PA15
run_current: 0.6
sense_resistor: 0.110

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_DEB93F655154364134202020FF153523-if00
x_offset: 0
y_offset: 32
mesh_main_direction: y
z_settling_time: 5
mesh_runs: 1
home_xy_position: 127.5, 127.5
home_z_hop: 5
home_z_hop_speed: 3
home_xy_move_speed: 200
home_method: contact
home_method_when_homed: proximity
home_autocalibrate: unhomed
home_y_before_x: True
autocal_speed: 4
autocal_retract_speed: 10

[axis_twist_compensation]
calibrate_start_x: 50
calibrate_end_x: 200
calibrate_y: 127.5

[z_tilt_ng]
z_positions:
 127.5, 245
 245, 10
 10, 10
points:
  127.5, 200
  235, 10
  20, 10
speed: 400
horizontal_move_z: 30
retries: 5
retry_tolerance: 0.025

[idle_timeout]
timeout: 3600

[bed_mesh]
speed: 400
horizontal_move_z: 3
mesh_min: 20, 20
mesh_max: 240, 200
probe_count: 25, 25
mesh_pps: 0
move_check_distance: 3
split_delta_z: .025
zero_reference_position: 127.5, 127.5
faulty_region_1_min: 230, 0
faulty_region_1_max: 260, 30

[input_shaper]
shaper_freq_x: 70.8
shaper_type_x: mzv
damping_ratio_x: 0.07
shaper_freq_y: 56.4
shaper_type_y: mzv
damping_ratio_y: 0.062

[exclude_object]

[heater_bed]
heater_pin: PG11
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA2
pullup_resistor: 2200
max_power: 1.0
min_temp: 0
max_temp: 130

[temperature_fan RPi]
sensor_type: temperature_host
pin: PF9
control: watermark
min_temp: 0
max_temp: 100
target_temp: 65.0
max_delta: 5.0

[temperature_sensor Leviathan]
sensor_type: temperature_mcu
sensor_mcu: mcu

[temperature_sensor Enclosure]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: mcu:PA3
pullup_resistor: 2200

[controller_fan stepper_fan]
pin: mcu:PB3
stepper: stepper_x, stepper_y, stepper_z, stepper_z1, stepper_z2

[heater_fan hotend_fan]
pin: toolhead:PA0
heater: extruder
heater_temp: 50.0

# Part cooling fan (using fan_generic instead of [fan] for MMU compatibility)
[fan_generic fan0]
pin: mcu:PF7
max_power: 0.8
shutdown_speed: 0
cycle_time: 0.005
kick_start_time: 0.05
off_below: 0.1

[gcode_macro M106]
gcode:
    {% set fan = 'fan' + (params.P|int if params.P is defined else 0)|string %}
    {% set speed = (params.S|float / 255 if params.S is defined else 1.0) %}
    SET_FAN_SPEED FAN={fan} SPEED={speed}

[neopixel chamber]
pin: mmb:PA2
chain_count: 13
color_order: GRB
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 1.0

[printer]
kinematics: corexy
max_velocity: 700
max_accel: 12000
max_z_velocity: 30
max_z_accel: 100
square_corner_velocity: 5.0

[force_move]
# Enable commands that force potentially unsafe movement
enable_force_move: True

[gcode_macro START_PRINT]
description: Called when starting print
gcode:
    {% set REFERENCED_TOOLS = params.REFERENCED_TOOLS|default("")|string %}
    {% set INITIAL_TOOL = params.INITIAL_TOOL|default(0)|int %}
    {% set BED_TEMP = params.BED_TEMP|default(0)|int %}
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(0)|int %}
    {% set NOZZLE_TEMP = params.NOZZLE_TEMP|default(0)|int %}
    {% set AD_OFFSET = params.OFFSET|default(0)|float %}

    {% if REFERENCED_TOOLS == "!referenced_tools!" %}
        RESPOND MSG="Happy Hare gcode pre-processor is disabled"
        {% set REFERENCED_TOOLS = INITIAL_TOOL %}
    {% elif REFERENCED_TOOLS == "" %}
        RESPOND MSG="Happy Hare single color print"
        {% set REFERENCED_TOOLS = INITIAL_TOOL %}
    {% endif %}

    G90 ; use absolute coordinates
    M83 ; extruder relative mode
    M140 S{BED_TEMP}
    M109 S140 ; set temporary nozzle temp to prevent oozing during homing
    G4 S10 ; allow partial nozzle warmup
    BED_MESH_CLEAR
    SET_GCODE_OFFSET Z=0.0
    G28 METHOD=CONTACT CALIBRATE=0
    BRUSH_NOZZLE
    G0 Z2 ; position beacon at 2mm for heat soak

    {% if CHAMBER_TEMP > 0 %}
      RESPOND MSG="Waiting for chamber temperature"
      TEMPERATURE_WAIT SENSOR="temperature_sensor Enclosure" MINIMUM={CHAMBER_TEMP}
    {% endif %}
    M190 S{BED_TEMP}
    G4 S60 ; wait for beacon to warm up

    G28 Z METHOD=CONTACT CALIBRATE=1
    BED_MESH_CALIBRATE ADAPTIVE=1
    BRUSH_NOZZLE
    G28 Z METHOD=CONTACT CALIBRATE=0

    G1 Z5 F240
    G1 X10 Y40 F3000

    M104 S{NOZZLE_TEMP} ; set final nozzle temp
    M109 S{NOZZLE_TEMP} ; wait for nozzle temp to stabilize

    SET_GCODE_OFFSET Z={0.013 + AD_OFFSET}

[gcode_macro TOOLCHANGE]
description: Called when changing filament
gcode:
    M104 S{params.NOZZLE_TEMP} ; set next filament temps
    M140 S{params.BED_TEMP}

    T{params.NEXT_TOOL} ; change tool

    M109 S{params.NOZZLE_TEMP} ; wait for next filament temps to stabilize
    M190 S{params.BED_TEMP}

[gcode_macro END_PRINT]
description: Called when ending print
gcode:
    {% set MAX_LAYER_Z = params.MAX_LAYER_Z|default(200)|int %}
    {% set PRINTABLE_HEIGHT = printer.toolhead.axis_maximum.z*0.8%}

    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-2.0 F3600                 ; retract filament
    BRUSH_NOZZLE

    {% if MAX_LAYER_Z < PRINTABLE_HEIGHT %}
        G1 Z{[MAX_LAYER_Z+2, PRINTABLE_HEIGHT]|min} F600 ; move print head up
    {% endif %}

    M140 S0 ; turn off heatbed
    M104 S0 ; turn off temperature
    M107 ; turn off fan
    G1 X5 Y{printer.toolhead.axis_maximum.y*0.8} F6000 ; present print

[gcode_macro _MMU_LOAD_SEQUENCE_STALLGUARD]
description: Called when MMU is asked to load filament
gcode:
    {% set length = params.LENGTH|float %}
    {% set full = params.FULL|int %}
    {% set skip_extruder = params.SKIP_EXTRUDER|int %}
    {% set extruder_only = params.EXTRUDER_ONLY|int %}

    {% if extruder_only %}
        _MMU_STEP_HOMING_MOVE ENDSTOP=mmu_ext_touch MOVE=100 MOTOR=extruder
        _MMU_STEP_SET_FILAMENT STATE=10	# FILAMENT_POS_LOADED
    {% else %}
        _MMU_STEP_LOAD_GATE
        _MMU_STEP_LOAD_BOWDEN LENGTH={length}
        {% if full and not skip_extruder %}
            _MMU_STEP_HOMING_MOVE ENDSTOP=mmu_ext_touch MOVE=100 MOTOR=gear+extruder
            _MMU_STEP_SET_FILAMENT STATE=10	# FILAMENT_POS_LOADED
        {% endif %}
    {% endif %}

[gcode_macro BRUSH_NOZZLE]
# heat nozzle for best results
variable_brushpos_x: -11
variable_brushpos_y: 80
variable_brushwidth: 2
variable_brushheight: 30
gcode:
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28         ;home axes before travel moves
    {% endif %}

    G90
    G1 X{brushpos_x} Y{brushpos_y} F5000  ;left position
    
    RESPOND MSG="Brushing Nozzle"
    G1 X{brushpos_x + brushwidth / 2} Y{brushpos_y + brushheight / 2} F5000
    G1 X{brushpos_x - brushwidth / 2} Y{brushpos_y - brushheight / 2} F2000
    G1 X{brushpos_x + brushwidth / 2} Y{brushpos_y + brushheight / 2} F2000
    G1 X{brushpos_x - brushwidth / 2} Y{brushpos_y - brushheight / 2} F2000
    G1 X{brushpos_x + brushwidth / 2} Y{brushpos_y + brushheight / 2} F2000
    RESPOND MSG="Nozzle Cleaned"

[gcode_macro PURGE_NOZZLE]
description: Purges filament into bucket
variable_purge_amount: 50
gcode:
    G1 X-10 Y95 F6000 ; move to bucket
    MMU_SYNC_GEAR_MOTOR SYNC=1 SERVO=1
    G1 E{purge_amount} F1000
    BRUSH_NOZZLE

[gcode_macro MMU_ACTION_CHANGED_CUSTOM]
description: Called when an action has changed
variable_last_led_r: 0
variable_last_led_g: 0
variable_last_led_b: 0
gcode:
    {% set ACTION = params.ACTION|string %}
    {% set OFF_ACTIONS = ["Loading", "Unloading", "Selecting", "Checking", "Purging"] %}
    {% set RESTORE_ACTIONS = ["Idle"] %}
    
    {% if ACTION in OFF_ACTIONS %}
        #Turn off LEDs
        SET_GCODE_VARIABLE MACRO=MMU_ACTION_CHANGED_CUSTOM VARIABLE=last_led_r VALUE={printer["neopixel chamber"].color_data[0][0]}
        SET_GCODE_VARIABLE MACRO=MMU_ACTION_CHANGED_CUSTOM VARIABLE=last_led_g VALUE={printer["neopixel chamber"].color_data[1][0]}
        SET_GCODE_VARIABLE MACRO=MMU_ACTION_CHANGED_CUSTOM VARIABLE=last_led_b VALUE={printer["neopixel chamber"].color_data[2][0]}
        SET_LED LED=chamber RED=0 GREEN=0 BLUE=0
        G4 P1000
    {% elif ACTION in RESTORE_ACTIONS %}
        #Restore last state of LEDs
        G4 P1000
        SET_LED LED=chamber RED={last_led_r} GREEN={last_led_g} BLUE={last_led_b}
    {% endif %} 

[endstop_phase]

[gcode_arcs]
resolution: 0.25

[adxl345]
cs_pin: toolhead:PB12
spi_software_sclk_pin: toolhead:PB10
spi_software_mosi_pin: toolhead:PB11
spi_software_miso_pin: toolhead:PB2
axes_map: x,y,z

[resonance_tester]
accel_chips: beacon, adxl345
probe_points: 127.5,127.5,20

